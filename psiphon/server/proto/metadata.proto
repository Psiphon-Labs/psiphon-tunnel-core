syntax = "proto3";

package psiphond;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/Psiphon-Labs/psiphon-tunnel-core/psiphon/server/pb";

message MetadataClient {
    string client_asn = 1; //LowCardinality
    string client_aso = 2; //LowCardinality
    string client_build_rev = 3; //LowCardinality
    string client_city = 4; //LowCardinality
    string client_features = 5; //LowCardinality
    string client_isp = 6; //LowCardinality
    string client_platform = 7; //LowCardinality
    string client_region = 8; //LowCardinality
    string client_version = 9; //LowCardinality
}

message MetadataDevice {
    string device_location = 1; //device_location uses geohash encoding
    string device_region = 2; //LowCardinality
}

message MetadataSession {
    string session_id = 1;
    string sponsor_id = 2; //LowCardinality
    string propagation_channel_id = 3; //LowCardinality
}

message MetadataServerEntry {
    string server_entry_region = 1; //LowCardinality
    string server_entry_source = 2; //LowCardinality
    string server_entry_tag = 3;
    google.protobuf.Timestamp server_entry_timestamp = 4;
    string server_packet_manipulation = 5; //LowCardinality
    string server_replay_fragmentation = 6; //LowCardinality
    string server_replay_packet_manipulation = 7; //LowCardinality
    bool server_entry_valid = 8;
}

message MetadataInproxy {
    string inproxy_broker_client_bpf = 1; //LowCardinality
    string inproxy_broker_dial_address = 2; //LowCardinality
    uint64 inproxy_broker_dns_attempt = 3;
    string inproxy_broker_dns_preferred = 4; //LowCardinality
    string inproxy_broker_dns_preresolved = 5; //LowCardinality
    uint64 inproxy_broker_dns_qname_mismatches = 6;
    bool inproxy_broker_dns_qname_must_match = 7;
    bool inproxy_broker_dns_qname_random_casing = 8;
    string inproxy_broker_dns_transform = 9; //LowCardinality
    uint64 inproxy_broker_downstream_bytes_fragmented = 10;
    string inproxy_broker_fronting_provider_id = 11; //LowCardinality
    string inproxy_broker_host_header = 12; //LowCardinality
    string inproxy_broker_http_transform = 13; //LowCardinality
    string inproxy_broker_id = 14; //LowCardinality
    bool inproxy_broker_is_replay = 15;
    bool inproxy_broker_is_reuse = 16;
    string inproxy_broker_resolved_ip_address = 17; //LowCardinality
    string inproxy_broker_sni_server_name = 18; //LowCardinality
    bool inproxy_broker_tls_fragmented = 19;
    string inproxy_broker_tls_profile = 20; //LowCardinality
    string inproxy_broker_tls_version = 21; //LowCardinality
    string inproxy_broker_transformed_host_name = 22; //LowCardinality
    string inproxy_broker_transport = 23; //LowCardinality
    uint64 inproxy_broker_upstream_bytes_fragmented = 24; //LowCardinality
    string inproxy_broker_user_agent = 25; //LowCardinality
    string inproxy_client_nat_type = 26; //LowCardinality
    string inproxy_client_port_mapping_types = 27; //LowCardinality
    string inproxy_connection_id = 28; //LowCardinality
    uint64 inproxy_dial_broker_offer_duration = 29;
    uint64 inproxy_dial_failed_attempts_duration = 30;
    uint64 inproxy_dial_nat_disovery_duration = 31;
    uint64 inproxy_dial_webrtc_connection_duration = 32;
    uint64 inproxy_dial_webrtc_ice_gathering_duration = 33;
    string inproxy_matched_common_compartments = 34; //LowCardinality
    bool inproxy_matched_personal_compartments = 35;
    string inproxy_proxy_applied_tactics_tag = 36; //LowCardinality
    string inproxy_proxy_asn = 37; //LowCardinality
    string inproxy_proxy_aso = 38; //LowCardinality
    string inproxy_proxy_city = 39; //LowCardinality
    string inproxy_proxy_client_build_rev = 40; //LowCardinality
    string inproxy_proxy_client_platform = 41; //LowCardinality
    string inproxy_proxy_client_version = 42; //LowCardinality
    uint64 inproxy_proxy_connected_clients = 43;
    uint64 inproxy_proxy_connecting_clients = 44;
    string inproxy_proxy_device_location = 45;
    string inproxy_proxy_device_region = 46; //LowCardinality
    string inproxy_proxy_features = 47; //LowCardinality
    string inproxy_proxy_fronting_provider_id = 48; //LowCardinality
    string inproxy_proxy_id = 49;
    bool inproxy_proxy_is_priority = 50;
    string inproxy_proxy_isp = 51; //LowCardinality
    uint64 inproxy_proxy_limit_downstream_bytes_per_second = 52;
    uint64 inproxy_proxy_limit_upstream_bytes_per_second = 53;
    uint64 inproxy_proxy_max_clients = 54;
    string inproxy_proxy_nat_type = 55; //LowCardinality
    string inproxy_proxy_network_type = 56; //LowCardinality
    uint64 inproxy_proxy_peak_downstream_bytes_per_second = 57;
    uint64 inproxy_proxy_peak_upstream_bytes_per_second = 58;
    string inproxy_proxy_port_mapping_types = 59; //LowCardinality
    string inproxy_proxy_propagation_channel_id = 60; //LowCardinality
    uint64 inproxy_proxy_protocol_version = 61;
    string inproxy_proxy_region = 62; //LowCardinality
    string inproxy_proxy_session_id = 63;
    string inproxy_proxy_sponsor_id = 64; //LowCardinality
    string inproxy_proxy_stored_tactics_tag = 65; //LowCardinality
    uint64 inproxy_webrtc_decoy_messages_received = 66;
    uint64 inproxy_webrtc_decoy_messages_sent = 67;
    uint64 inproxy_webrtc_dns_attempt = 68;
    string inproxy_webrtc_dns_preferred = 69; //LowCardinality
    string inproxy_webrtc_dns_preresolved = 70; //LowCardinality
    uint64 inproxy_webrtc_dns_qname_mismatches = 71;
    bool inproxy_webrtc_dns_qname_must_match = 72;
    bool inproxy_webrtc_dns_qname_random_casing = 73;
    string inproxy_webrtc_dns_transform = 74; //LowCardinality
    bool inproxy_webrtc_local_ice_candidate_is_IPv6 = 75;
    bool inproxy_webrtc_local_ice_candidate_is_initiator = 76;
    uint64 inproxy_webrtc_local_ice_candidate_port = 77;
    string inproxy_webrtc_local_ice_candidate_type = 78; //LowCardinality
    uint64 inproxy_webrtc_padded_messages_received = 79;
    uint64 inproxy_webrtc_padded_messages_sent = 80;
    bool inproxy_webrtc_randomize_dtls = 81;
    bool inproxy_webrtc_remote_ice_candidate_is_IPv6 = 82;
    uint64 inproxy_webrtc_remote_ice_candidate_port = 83;
    string inproxy_webrtc_remote_ice_candidate_type = 84; //LowCardinality
    string inproxy_webrtc_stun_server = 85; //LowCardinality
    string inproxy_webrtc_stun_server_RFC5780 = 86; //LowCardinality
    string inproxy_webrtc_stun_server_RFC5780_resolved_ip_address = 87; //LowCardinality
    string inproxy_webrtc_stun_server_resolved_ip_address = 88; //LowCardinality
    bool inproxy_webrtc_use_media_streams = 89;
}

message MetadataConjure {
    bool conjure_cached = 1;
    uint64 conjure_delay = 2;
    bool conjure_empty_packet = 3;
    string conjure_network = 4; //LowCardinality
    uint64 conjure_port_number = 5;
    string conjure_prefix = 6; //LowCardinality
    string conjure_stun = 7; //LowCardinality
    string conjure_transport = 8; //LowCardinality
}

message MetadataMeek {
    uint64 meek_cached_response_miss_position = 1;
    uint64 meek_client_retries = 2;
    uint64 meek_cookie_size = 3;
    string meek_dial_domain = 4;  //LowCardinality
    string meek_dial_ip_address = 5;  //LowCardinality
    string meek_host_header = 6;
    uint64 meek_limit_request = 7;
    uint64 meek_peak_cached_response_hit_size = 8;
    uint64 meek_peak_cached_response_size = 9;
    uint64 meek_peak_response_size = 10;
    uint64 meek_redial_probability = 11;
    string meek_resolved_ip_address = 12; //LowCardinality
    string meek_sni_server_name = 13;
    uint64 meek_tls_padding = 14;
    string meek_transformed_host_name = 15; //LowCardinality
    uint64 meek_underlying_connection_count = 16;
}

message MetadataQuic {
    bool quic_dial_early = 1;
    string quic_dial_sni_address = 2;
    bool quic_did_resume = 3;
    bool quic_disable_client_path_mtu_discovery = 4;
    bool quic_obfuscated_psk = 5;
    bool quic_sent_ticket = 6;
    string quic_version = 7; //LowCardinality
}

message MetadataTLS {
    bool tls_did_resume = 1;
    bool tls_fragmented = 2;
    string tls_ossh_sni_server_name = 3;
    bool tls_ossh_transformed_host_name = 4;
    uint64 tls_padding = 5;
    string tls_profile = 6; //LowCardinality
    bool tls_sent_ticket = 7; //LowCardinality
    string tls_version = 8; //LowCardinality
}

message MetadataShadowsocks {
    string shadowsocks_prefix = 1;  //LowCardinality
}

