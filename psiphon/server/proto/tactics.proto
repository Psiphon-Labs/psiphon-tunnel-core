syntax = "proto3";

package psiphond;

import "proto/metadata.proto";

option go_package = "github.com/Psiphon-Labs/psiphon-tunnel-core/psiphon/server/pb";

message Tactics {
    psiphond.MetadataClient metadata_client = 1;
    psiphond.MetadataDevice metadata_device = 2;
    psiphond.MetadataSession metadata_session = 3;
    psiphond.MetadataServerEntry metadata_server_entry = 4;

    psiphond.MetadataMeek metadata_meek = 5;
    psiphond.MetadataTLS metadata_tls = 6;

    // Fields 1-99 are reserved for metadata.

    string applied_tactics_tag = 100; //LowCardinality
    uint64 dial_duration = 101;
    uint64 dial_port_number = 102;
    string egress_region = 103; //LowCardinality
    uint64 established_tunnels_count = 104;
    string fronting_provider_id = 105; //LowCardinality
    bool is_replay = 106;
    bool is_tactics_request = 107;
    double network_latency_multiplier = 108;
    string network_type = 109; //LowCardinality
    string new_tactics_tag = 110; //LowCardinality
    string relay_protocol = 111; //LowCardinality
    string root_event_id = 112;
    string ssh_client_version = 113; //LowCardinality
    string stored_tactics_tag = 114; //LowCardinality
    string user_agent = 117;
}

message TacticsSpeedTest {
    psiphond.MetadataClient metadata_client = 1;
    psiphond.MetadataDevice metadata_device = 2;
    psiphond.MetadataSession metadata_session = 3;

    // Fields 1-99 are reserved for metadata.

    uint64 round_trip_time_ms = 100;
    uint64 bytes_down = 101;
    uint64 bytes_up = 102;
    string relay_protocol = 103; //LowCardinality
    string server_region = 104; //LowCardinality
}
