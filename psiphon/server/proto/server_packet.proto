syntax = "proto3";

package psiphond;


option go_package = "github.com/Psiphon-Labs/psiphon-tunnel-core/psiphon/server/pb";

message ServerPacket {

    // Fields 1-99 are reserved for metadata.

    uint64 tcp_ipv4_application_bytes_down = 100;
    uint64 tcp_ipv4_application_bytes_up = 101;
    uint64 tcp_ipv4_bytes_down = 102;
    uint64 tcp_ipv4_bytes_up = 103;
    uint64 tcp_ipv4_packets_down = 104;
    uint64 tcp_ipv4_packets_up = 105;
    uint64 tcp_ipv6_application_bytes_down = 106;
    uint64 tcp_ipv6_application_bytes_up = 107;
    uint64 tcp_ipv6_bytes_down = 108;
    uint64 tcp_ipv6_bytes_up = 109;
    uint64 tcp_ipv6_packets_down = 110;
    uint64 tcp_ipv6_packets_up = 111;

    uint64 udp_ipv4_application_bytes_down = 112;
    uint64 udp_ipv4_application_bytes_up = 113;
    uint64 udp_ipv4_bytes_down = 114;
    uint64 udp_ipv4_bytes_up = 115;
    uint64 udp_ipv4_packets_down = 116;
    uint64 udp_ipv4_packets_up = 117;
    uint64 udp_ipv6_application_bytes_down = 118;
    uint64 udp_ipv6_application_bytes_up = 119;
    uint64 udp_ipv6_bytes_down = 120;
    uint64 udp_ipv6_bytes_up = 121;
    uint64 udp_ipv6_packets_down = 122;
    uint64 udp_ipv6_packets_up = 123;
}
