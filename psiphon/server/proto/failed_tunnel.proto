syntax = "proto3";

package psiphond;

import "proto/metadata.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/Psiphon-Labs/psiphon-tunnel-core/psiphon/server/pb";

message FailedTunnel {
    psiphond.MetadataClient metadata_client = 1;
    psiphond.MetadataDevice metadata_device = 2;
    psiphond.MetadataSession metadata_session = 3;
    psiphond.MetadataServerEntry metadata_server_entry = 4;

    // Protocol Metadata
    psiphond.MetadataConjure metadata_conjure = 5;
    psiphond.MetadataInproxy metadata_inproxy = 6;
    psiphond.MetadataMeek metadata_meek = 7;
    psiphond.MetadataQuic metadata_quic = 8;
    psiphond.MetadataShadowsocks metadata_shadowsocks = 9;
    psiphond.MetadataTLS metadata_tls = 10;

    // Fields 1-99 are reserved for metadata.

    int32 candidate_number = 100;
    string tunnel_id = 101;
    string authorized_access_types = 102; //LowCardinality

    string applied_tactics_tag = 103; //LowCardinality
    uint64 bytes_down = 104;
    uint64 bytes_up = 105;
    google.protobuf.Timestamp client_failed_timestamp = 106;
    uint64 dial_duration = 107;
    uint64 dial_port_number = 108;
    string egress_region = 109; //LowCardinality
    uint64 established_tunnels_count = 110;
    string fronting_provider_id = 111; //LowCardinality
    bool is_replay = 112;
    google.protobuf.Timestamp last_connected = 113;
    uint64 liveness_test_downstream_bytes = 114;
    uint64 liveness_test_received_downstream_bytes = 115;
    uint64 liveness_test_sent_upstream_bytes = 116;
    uint64 liveness_test_upstream_bytes = 117;
    double network_latency_multiplier = 118;
    string network_type = 119; //LowCardinality
    double record_probability = 120;
    string relay_protocol = 121; //LowCardinality

    string ssh_client_version = 122;  //LowCardinality

    string tunnel_error = 123; //LowCardinality
    uint64 upstream_bytes_fragmented = 124;
    uint64 upstream_max_bytes_written = 125;
    uint64 upstream_max_delayed = 126;
    uint64 upstream_min_bytes_written = 127;
    uint64 upstream_min_delayed = 128;
    uint64 upstream_ossh_padding = 129;
    string upstream_proxy_custom_header_names = 130; //LowCardinality
    string upstream_proxy_type = 131; //LowCardinality
    string user_agent = 132;
}
