syntax = "proto3";

package psiphond;

import "proto/metadata.proto";

option go_package = "github.com/Psiphon-Labs/psiphon-tunnel-core/psiphon/server/pb";

message InproxyBroker {
    psiphond.MetadataClient metadata_client = 1;
    psiphond.MetadataDevice metadata_device = 2;
    psiphond.MetadataSession metadata_session = 3;
    psiphond.MetadataServerEntry metadata_server_entry = 4;
    
    psiphond.MetadataMeek metadata_meek = 5;

    // Fields 1-99 are reserved for metadata.

    string applied_tactics_tag = 100; //LowCardinality
    uint64 dial_duration = 101;
    uint64 dial_port_number = 102;
    string egress_region = 103; //LowCardinality
    uint64 established_tunnels_count = 104;
    string fronting_provider_id = 105; //LowCardinality
    bool is_replay = 106;
    double network_latency_multiplier = 113;
    string network_type = 114; //LowCardinality
    string relay_protocol = 115; //LowCardinality
    string ssh_client_version = 116; //LowCardinality
    string stored_tactics_tag = 117; //LowCardinality
}